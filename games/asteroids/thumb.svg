<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <rect width="320" height="200" fill="#efe6d2"/>
  <!-- big jagged asteroid (top-right) -->
  <polygon points="232,38 256,30 278,44 286,68 274,90 250,96 228,84 222,60"
           fill="#6f6a3b" stroke="#221f17" stroke-width="3" stroke-linejoin="round"/>
  <!-- small asteroid (lower-left) -->
  <polygon points="64,138 80,132 92,144 88,162 70,168 56,156"
           fill="#c8923a" stroke="#221f17" stroke-width="3" stroke-linejoin="round"/>
  <!-- player ship: classic pointing triangle, mid-canvas, aimed up-right -->
  <polygon points="168,150 132,128 150,120 150,108 168,128"
           fill="#9b3a22" stroke="#221f17" stroke-width="3" stroke-linejoin="round"/>
  <!-- shots streaking toward the big rock -->
  <circle cx="190" cy="106" r="4" fill="#221f17"/>
  <circle cx="206" cy="92" r="3.5" fill="#221f17"/>
  <circle cx="220" cy="80" r="3" fill="#221f17"/>
</svg>
