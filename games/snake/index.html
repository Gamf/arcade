<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0e0f13">
  <title>Snake — Gamf</title>
  <style>
    *{box-sizing:border-box} html,body{margin:0;height:100%;overflow:hidden;background:#0e0f13;color:#f2f3f5;
      font-family:system-ui,sans-serif;-webkit-tap-highlight-color:transparent;touch-action:none;
      -webkit-user-select:none;user-select:none}
    .wrap{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
      padding:env(safe-area-inset-top) 12px env(safe-area-inset-bottom)}
    .top{display:flex;align-items:center;gap:14px;width:min(94vw,460px)}
    .top a{color:#6c8cff;text-decoration:none;font-size:.9rem}
    .top .best{color:#7fe3a0;font-weight:700}
    .top .sc{margin-left:auto;font-weight:700}
    canvas{background:#11131b;border-radius:14px;touch-action:none;
      box-shadow:0 10px 40px rgba(0,0,0,.5),0 0 0 1px rgba(108,140,255,.12)}
    .hint{color:#7d8493;font-size:.85rem;text-align:center}
    .over{position:fixed;inset:0;display:none;place-items:center;background:rgba(8,9,13,.84);z-index:3;text-align:center}
    .over.show{display:grid} .over h2{margin:0 0 6px;font-size:1.8rem}
    .over .row{color:#aeb4c2;margin:4px 0}
    .over b{color:#9ab4ff} .over .bbest{color:#7fe3a0}
    .over button{all:unset;margin-top:16px;color:#0e0f13;
      background:linear-gradient(135deg,#9ab4ff,#6c8cff);font-weight:700;padding:12px 22px;border-radius:12px;cursor:pointer;
      box-shadow:0 6px 20px rgba(108,140,255,.4)}
    .paused{position:fixed;inset:0;display:none;place-items:center;background:rgba(8,9,13,.55);z-index:2;
      font-size:1.4rem;font-weight:700;letter-spacing:.1em}
    .paused.show{display:grid}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top"><a href="../../">← Arcade</a>
      <span>Best: <b class="best" id="best">0</b></span><span class="sc">Score: <b id="score">0</b></span></div>
    <canvas id="c"></canvas>
    <div class="hint">swipe / arrows · WASD &nbsp;·&nbsp; P pause · R restart</div>
  </div>
  <div class="paused" id="paused">PAUSED</div>
  <div class="over" id="over"><div><h2>Game Over</h2>
    <div class="row">Score <b id="finalScore">0</b></div>
    <div class="row">Best <b class="bbest" id="finalBest">0</b></div>
    <button id="again">Play again</button></div></div>
  <script type="module">
    import { onSwipe } from './touch.js';
    const SLUG='snake', BEST_KEY='gamf-arcade-'+SLUG+'-best';
    const N=17;                                   // grid is N x N
    const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
    let cell=20;
    function fit(){ const size=Math.min(innerWidth-24, innerHeight-150, 460);
      cell=Math.floor(size/N); const dpr=Math.min(devicePixelRatio||1,2);
      canvas.width=N*cell*dpr; canvas.height=N*cell*dpr;
      canvas.style.width=N*cell+'px'; canvas.style.height=N*cell+'px';
      ctx.setTransform(dpr,0,0,dpr,0,0); draw(); }
    addEventListener('resize', fit);

    let snake, dir, nextDir, food, score, best=+(localStorage.getItem(BEST_KEY)||0), timer, speed, alive, paused=false;
    document.getElementById('best').textContent=best;
    let seed=5; const rnd=()=> (seed=(seed*1103515245+12345)&0x7fffffff)/0x7fffffff;

    // particles for eat/death bursts
    let particles=[];
    function burst(cx,cy,color,n=14){ for(let i=0;i<n;i++){ const a=rnd()*Math.PI*2, sp=0.6+rnd()*2.2;
      particles.push({x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,color}); } }
    let tBg=0; // animated background phase

    function placeFood(){ do { food={x:Math.floor(rnd()*N),y:Math.floor(rnd()*N)}; }
      while(snake.some(s=>s.x===food.x&&s.y===food.y)); }
    function reset(){ snake=[{x:8,y:8},{x:7,y:8},{x:6,y:8}]; dir={x:1,y:0}; nextDir=dir;
      score=0; speed=130; alive=true; paused=false; particles=[]; placeFood();
      document.getElementById('score').textContent=0;
      document.getElementById('over').classList.remove('show');
      document.getElementById('paused').classList.remove('show');
      clearInterval(timer); timer=setInterval(tick, speed); fit(); }

    function togglePause(){ if(!alive) return; paused=!paused;
      document.getElementById('paused').classList.toggle('show',paused); }

    function setDir(nx,ny){ if(nx===-dir.x&&ny===-dir.y) return; nextDir={x:nx,y:ny}; }
    function tick(){ if(!alive||paused) return; dir=nextDir;
      const head={x:snake[0].x+dir.x, y:snake[0].y+dir.y};
      if(head.x<0||head.x>=N||head.y<0||head.y>=N||snake.some(s=>s.x===head.x&&s.y===head.y)){
        burst((head.x+.5)*cell,(head.y+.5)*cell,'#ff7a6c',22); return end(); }
      snake.unshift(head);
      if(head.x===food.x&&head.y===food.y){ score++; document.getElementById('score').textContent=score;
        burst((food.x+.5)*cell,(food.y+.5)*cell,'#7fe3a0',16);
        placeFood(); if(speed>60){ speed-=4; clearInterval(timer); timer=setInterval(tick,speed); } }
      else snake.pop(); }

    function cellRect(x,y,c,r=4,glow=0){ const p=x*cell, q=y*cell;
      ctx.save(); if(glow){ ctx.shadowBlur=glow; ctx.shadowColor=c; }
      ctx.fillStyle=c; ctx.beginPath(); ctx.roundRect(p+1,q+1,cell-2,cell-2,r); ctx.fill(); ctx.restore(); }

    function draw(){ const S=N*cell;
      // animated gradient background
      const g=ctx.createLinearGradient(0,0,S,S);
      g.addColorStop(0,'#11131b'); g.addColorStop(1,'#161a26');
      ctx.fillStyle=g; ctx.fillRect(0,0,S,S);
      // subtle moving grid glow
      ctx.save(); ctx.globalAlpha=0.06+0.03*Math.sin(tBg/30); ctx.strokeStyle='#6c8cff'; ctx.lineWidth=1;
      for(let i=1;i<N;i++){ ctx.beginPath(); ctx.moveTo(i*cell,0); ctx.lineTo(i*cell,S);
        ctx.moveTo(0,i*cell); ctx.lineTo(S,i*cell); ctx.stroke(); } ctx.restore();
      // food with pulsing glow
      const pulse=10+5*Math.sin(tBg/8);
      cellRect(food.x,food.y,'#ff7a6c',cell/2,pulse);
      // snake gradient head->tail
      snake.forEach((s,i)=>{ const t=i/Math.max(1,snake.length-1);
        const col=i===0?'#aecaff':`rgb(${Math.round(108+60*(1-t))},${Math.round(140+30*(1-t))},255)`;
        cellRect(s.x,s.y,col,5,i===0?12:0); });
      // particles
      particles.forEach(p=>{ ctx.save(); ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle=p.color;
        ctx.shadowBlur=8; ctx.shadowColor=p.color; ctx.beginPath();
        ctx.arc(p.x,p.y,2.5*p.life,0,7); ctx.fill(); ctx.restore(); }); }

    function loop(){ tBg++;
      particles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=0.06; p.life-=0.03; });
      particles=particles.filter(p=>p.life>0);
      draw(); requestAnimationFrame(loop); }

    function end(){ alive=false; clearInterval(timer);
      if(score>best){ best=score; localStorage.setItem(BEST_KEY,best); document.getElementById('best').textContent=best; }
      document.getElementById('finalScore').textContent=score;
      document.getElementById('finalBest').textContent=best;
      document.getElementById('over').classList.add('show'); }

    onSwipe(canvas,(d)=>{ if(d==='left')setDir(-1,0); else if(d==='right')setDir(1,0);
      else if(d==='up')setDir(0,-1); else setDir(0,1); },18);
    addEventListener('keydown',e=>{
      const k=e.key.length===1?e.key.toLowerCase():e.key;
      const m={ArrowLeft:[-1,0],a:[-1,0],ArrowRight:[1,0],d:[1,0],
               ArrowUp:[0,-1],w:[0,-1],ArrowDown:[0,1],s:[0,1]}[k];
      if(m){ e.preventDefault(); setDir(m[0],m[1]); return; }
      if(k==='p'){ e.preventDefault(); togglePause(); return; }
      if(k==='r'){ e.preventDefault(); reset(); return; }
      if((k===' '||k==='Enter')&&!alive){ e.preventDefault(); reset(); } });
    document.getElementById('again').onclick=reset;
    reset(); loop();
  </script>
</body>
</html>
