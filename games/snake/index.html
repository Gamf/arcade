<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0e0f13">
  <title>Snake — Gamf</title>
  <style>
    *{box-sizing:border-box} html,body{margin:0;height:100%;overflow:hidden;background:#0e0f13;color:#f2f3f5;
      font-family:system-ui,sans-serif;-webkit-tap-highlight-color:transparent;touch-action:none;
      -webkit-user-select:none;user-select:none}
    .wrap{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
      padding:env(safe-area-inset-top) 12px env(safe-area-inset-bottom)}
    .top{display:flex;align-items:center;gap:14px;width:min(94vw,460px)}
    .top a{color:#6c8cff;text-decoration:none;font-size:.9rem} .top .sc{margin-left:auto;font-weight:700}
    canvas{background:#11131b;border-radius:12px;touch-action:none}
    .hint{color:#7d8493;font-size:.85rem}
    .over{position:fixed;inset:0;display:none;place-items:center;background:rgba(8,9,13,.82);z-index:3;text-align:center}
    .over.show{display:grid} .over h2{margin:0 0 6px} .over button{all:unset;margin-top:14px;color:#0e0f13;
      background:#ff7a6c;font-weight:700;padding:12px 22px;border-radius:12px;cursor:pointer}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top"><a href="../../">← Arcade</a>
      <span>Best: <b id="best">0</b></span><span class="sc">Score: <b id="score">0</b></span></div>
    <canvas id="c"></canvas>
    <div class="hint">Swipe to turn</div>
  </div>
  <div class="over" id="over"><div><h2>Game Over</h2><div>Score <b id="finalScore">0</b></div>
    <button id="again">Play again</button></div></div>
  <script type="module">
    import { onSwipe } from './touch.js';
    const N=17;                                   // grid is N x N
    const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
    let cell=20;
    function fit(){ const size=Math.min(innerWidth-24, innerHeight-150, 460);
      cell=Math.floor(size/N); const dpr=Math.min(devicePixelRatio||1,2);
      canvas.width=N*cell*dpr; canvas.height=N*cell*dpr;
      canvas.style.width=N*cell+'px'; canvas.style.height=N*cell+'px';
      ctx.setTransform(dpr,0,0,dpr,0,0); draw(); }
    addEventListener('resize', fit);

    let snake, dir, nextDir, food, score, best=+(localStorage.getItem('gamf-snake-best')||0), timer, speed, alive;
    document.getElementById('best').textContent=best;
    let seed=5; const rnd=()=> (seed=(seed*1103515245+12345)&0x7fffffff)/0x7fffffff;

    function placeFood(){ do { food={x:Math.floor(rnd()*N),y:Math.floor(rnd()*N)}; }
      while(snake.some(s=>s.x===food.x&&s.y===food.y)); }
    function reset(){ snake=[{x:8,y:8},{x:7,y:8},{x:6,y:8}]; dir={x:1,y:0}; nextDir=dir;
      score=0; speed=130; alive=true; placeFood();
      document.getElementById('score').textContent=0; document.getElementById('over').classList.remove('show');
      clearInterval(timer); timer=setInterval(tick, speed); fit(); }

    function setDir(nx,ny){ if(nx===-dir.x&&ny===-dir.y) return; nextDir={x:nx,y:ny}; }
    function tick(){ if(!alive) return; dir=nextDir;
      const head={x:snake[0].x+dir.x, y:snake[0].y+dir.y};
      if(head.x<0||head.x>=N||head.y<0||head.y>=N||snake.some(s=>s.x===head.x&&s.y===head.y)) return end();
      snake.unshift(head);
      if(head.x===food.x&&head.y===food.y){ score++; document.getElementById('score').textContent=score;
        placeFood(); if(speed>60){ speed-=4; clearInterval(timer); timer=setInterval(tick,speed); } }
      else snake.pop();
      draw(); }

    function cellRect(x,y,c,r=4){ ctx.fillStyle=c; const p=x*cell, q=y*cell;
      ctx.beginPath(); ctx.roundRect(p+1,q+1,cell-2,cell-2,r); ctx.fill(); }
    function draw(){ ctx.clearRect(0,0,N*cell,N*cell);
      cellRect(food.x,food.y,'#ff7a6c',cell/2);
      snake.forEach((s,i)=> cellRect(s.x,s.y, i===0?'#9ab4ff':'#6c8cff')); }

    function end(){ alive=false; clearInterval(timer);
      if(score>best){ best=score; localStorage.setItem('gamf-snake-best',best); document.getElementById('best').textContent=best; }
      document.getElementById('finalScore').textContent=score; document.getElementById('over').classList.add('show'); }

    onSwipe(canvas,(d)=>{ if(d==='left')setDir(-1,0); else if(d==='right')setDir(1,0);
      else if(d==='up')setDir(0,-1); else setDir(0,1); },18);
    addEventListener('keydown',e=>{ const m={ArrowLeft:[-1,0],ArrowRight:[1,0],ArrowUp:[0,-1],ArrowDown:[0,1]}[e.key];
      if(m){ e.preventDefault(); setDir(m[0],m[1]); } });
    document.getElementById('again').onclick=reset;
    reset();
  </script>
</body>
</html>
