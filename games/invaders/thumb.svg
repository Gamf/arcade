<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <rect width="320" height="200" fill="#efe6d2"/>
  <!-- alien invader (original blocky creature) -->
  <g fill="#9b3a22">
    <rect x="128" y="40" width="64" height="14"/>
    <rect x="116" y="54" width="88" height="14"/>
    <rect x="104" y="68" width="112" height="16"/>
    <rect x="104" y="84" width="20" height="14"/>
    <rect x="140" y="84" width="40" height="14"/>
    <rect x="196" y="84" width="20" height="14"/>
    <!-- antennae -->
    <rect x="120" y="28" width="12" height="14"/>
    <rect x="188" y="28" width="12" height="14"/>
    <!-- legs -->
    <rect x="108" y="98" width="12" height="14"/>
    <rect x="200" y="98" width="12" height="14"/>
  </g>
  <!-- alien eyes -->
  <rect x="136" y="68" width="14" height="14" fill="#efe6d2"/>
  <rect x="170" y="68" width="14" height="14" fill="#efe6d2"/>
  <!-- white shot streaking down -->
  <rect x="157" y="118" width="6" height="20" fill="#221f17"/>
  <!-- player cannon at base -->
  <g fill="#6f6a3b">
    <rect x="120" y="170" width="80" height="14"/>
    <rect x="146" y="160" width="28" height="12"/>
    <rect x="156" y="148" width="8" height="14"/>
  </g>
  <!-- ochre mystery saucer -->
  <g fill="#c8923a">
    <ellipse cx="252" cy="44" rx="26" ry="9"/>
    <ellipse cx="252" cy="38" rx="13" ry="7"/>
  </g>
</svg>
