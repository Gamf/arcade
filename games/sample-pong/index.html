<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0e0f13">
  <title>Wall Pong — Gamf</title>
  <style>
    *{box-sizing:border-box} html,body{margin:0;height:100%;overflow:hidden;background:#0e0f13;color:#f2f3f5;
      font-family:system-ui,sans-serif;-webkit-tap-highlight-color:transparent;touch-action:none;
      -webkit-user-select:none;user-select:none}
    .hud{position:fixed;top:env(safe-area-inset-top);left:0;right:0;display:flex;gap:16px;
      padding:12px 16px;align-items:center;pointer-events:none;z-index:2}
    .hud a{color:#6c8cff;text-decoration:none;font-size:.9rem;pointer-events:auto}
    .hud .score{margin-left:auto;font-weight:700}
    canvas{display:block;width:100%;height:100%;touch-action:none}
  </style>
</head>
<body>
  <div class="hud"><a href="../../">← Arcade</a><span class="score">Hits: <b id="hits">0</b></span></div>
  <canvas id="c" class="game-canvas"></canvas>
  <script type="module">
    import { onDrag } from './touch.js';
    const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
    let W, H, dpr;
    function resize(){ dpr=Math.min(devicePixelRatio||1,2); W=innerWidth; H=innerHeight;
      canvas.width=W*dpr; canvas.height=H*dpr; ctx.setTransform(dpr,0,0,dpr,0,0); }
    addEventListener('resize', resize); resize();

    const paddle={ w:110, h:16, x:0, y:0 };
    const ball={ x:0, y:0, vx:0, vy:0, r:10 };
    let hits=0, started=false;
    function start(){ paddle.x=W/2-paddle.w/2; paddle.y=H-60;
      ball.x=W/2; ball.y=H/3; ball.vx=3.2; ball.vy=4.2; hits=0; started=true; document.getElementById('hits').textContent=0; }

    // Drag anywhere to move the paddle horizontally.
    onDrag(canvas,{ move:({x})=>{ paddle.x=Math.max(0,Math.min(W-paddle.w, x-paddle.w/2)); } });

    function step(){
      if(started){
        ball.x+=ball.vx; ball.y+=ball.vy;
        if(ball.x<ball.r||ball.x>W-ball.r) ball.vx*=-1;
        if(ball.y<ball.r) ball.vy*=-1;
        // paddle collision
        if(ball.y+ball.r>=paddle.y && ball.y<paddle.y+paddle.h &&
           ball.x>paddle.x && ball.x<paddle.x+paddle.w && ball.vy>0){
          ball.vy*=-1; ball.vy-=0.15; ball.vx+=(ball.x-(paddle.x+paddle.w/2))/18;
          hits++; document.getElementById('hits').textContent=hits;
        }
        if(ball.y>H+40) start(); // missed -> reset
      }
      ctx.clearRect(0,0,W,H);
      ctx.fillStyle='#ff7a6c'; ctx.beginPath(); ctx.arc(ball.x,ball.y,ball.r,0,7); ctx.fill();
      ctx.fillStyle='#6c8cff'; ctx.fillRect(paddle.x,paddle.y,paddle.w,paddle.h);
      requestAnimationFrame(step);
    }
    start(); step();
  </script>
</body>
</html>
