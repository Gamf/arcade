<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0e0f13">
  <title>Wall Pong — Gamf</title>
  <style>
    *{box-sizing:border-box} html,body{margin:0;height:100%;overflow:hidden;background:#0e0f13;color:#f2f3f5;
      font-family:system-ui,sans-serif;-webkit-tap-highlight-color:transparent;touch-action:none;
      -webkit-user-select:none;user-select:none}
    .hud{position:fixed;top:env(safe-area-inset-top);left:0;right:0;display:flex;gap:16px;
      padding:12px 16px;align-items:center;pointer-events:none;z-index:2;font-size:.95rem}
    .hud a{color:#6c8cff;text-decoration:none;font-size:.9rem;pointer-events:auto}
    .hud .best{color:#7fe3a0;font-weight:700}
    .hud .lives{color:#ff7a6c;font-weight:700}
    .hud .score{margin-left:auto;font-weight:700}
    .hint{position:fixed;left:0;right:0;bottom:calc(env(safe-area-inset-bottom) + 10px);text-align:center;
      color:#7d8493;font-size:.82rem;z-index:2;pointer-events:none}
    canvas{display:block;width:100%;height:100%;touch-action:none}
    .over{position:fixed;inset:0;display:none;place-items:center;background:rgba(8,9,13,.84);z-index:3;text-align:center}
    .over.show{display:grid} .over h2{margin:0 0 6px;font-size:1.8rem}
    .over .row{color:#aeb4c2;margin:4px 0} .over b{color:#9ab4ff} .over .bbest{color:#7fe3a0}
    .over button{all:unset;margin-top:16px;color:#0e0f13;
      background:linear-gradient(135deg,#9ab4ff,#6c8cff);font-weight:700;padding:12px 22px;border-radius:12px;cursor:pointer;
      box-shadow:0 6px 20px rgba(108,140,255,.4)}
    .paused{position:fixed;inset:0;display:none;place-items:center;background:rgba(8,9,13,.5);z-index:2;
      font-size:1.4rem;font-weight:700;letter-spacing:.1em} .paused.show{display:grid}
  </style>
</head>
<body>
  <div class="hud"><a href="../../">← Arcade</a>
    <span class="lives" id="lives">●●●</span>
    <span class="best">Best: <b id="best">0</b></span>
    <span class="score">Hits: <b id="hits">0</b></span></div>
  <canvas id="c" class="game-canvas"></canvas>
  <div class="hint">drag / ← → · A D &nbsp;·&nbsp; P pause · R restart</div>
  <div class="paused" id="paused">PAUSED</div>
  <div class="over" id="over"><div><h2>Game Over</h2>
    <div class="row">Hits <b id="finalScore">0</b></div>
    <div class="row">Best <b class="bbest" id="finalBest">0</b></div>
    <button id="again">Play again</button></div></div>
  <script type="module">
    import { onDrag } from './touch.js';
    const SLUG='sample-pong', BEST_KEY='gamf-arcade-'+SLUG+'-best';
    const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
    let W, H, dpr;
    function resize(){ dpr=Math.min(devicePixelRatio||1,2); W=innerWidth; H=innerHeight;
      canvas.width=W*dpr; canvas.height=H*dpr; ctx.setTransform(dpr,0,0,dpr,0,0); }
    addEventListener('resize', resize); resize();

    const paddle={ w:110, h:16, x:0, y:0 };
    const ball={ x:0, y:0, vx:0, vy:0, r:10 };
    let hits=0, lives=3, alive=true, paused=false, t=0;
    let best=+(localStorage.getItem(BEST_KEY)||0);
    document.getElementById('best').textContent=best;
    let seed=7; const rnd=()=> (seed=(seed*1103515245+12345)&0x7fffffff)/0x7fffffff;

    let particles=[];
    function burst(cx,cy,color,n=14){ for(let i=0;i<n;i++){ const a=rnd()*Math.PI*2, sp=0.6+rnd()*3;
      particles.push({x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,color}); } }

    function serveBall(){ ball.x=W/2; ball.y=H/3; ball.vx=(rnd()<.5?-1:1)*3.2; ball.vy=4.2; }
    function start(){ paddle.x=W/2-paddle.w/2; paddle.y=H-70;
      hits=0; lives=3; alive=true; paused=false; particles=[]; serveBall();
      updateHud(); document.getElementById('over').classList.remove('show');
      document.getElementById('paused').classList.remove('show'); }
    function updateHud(){ document.getElementById('hits').textContent=hits;
      document.getElementById('lives').textContent='●'.repeat(Math.max(0,lives)); }
    function togglePause(){ if(!alive) return; paused=!paused;
      document.getElementById('paused').classList.toggle('show',paused); }

    function loseLife(){ lives--; updateHud(); burst(ball.x,H-40,'#ff7a6c',20);
      if(lives<=0) return end(); serveBall(); }
    function end(){ alive=false;
      if(hits>best){ best=hits; localStorage.setItem(BEST_KEY,best); document.getElementById('best').textContent=best; }
      document.getElementById('finalScore').textContent=hits;
      document.getElementById('finalBest').textContent=best;
      document.getElementById('over').classList.add('show'); }

    // Drag anywhere to move the paddle horizontally.
    onDrag(canvas,{ move:({x})=>{ if(alive&&!paused) paddle.x=Math.max(0,Math.min(W-paddle.w, x-paddle.w/2)); } });
    // Keyboard steering
    let keyDir=0;
    addEventListener('keydown',e=>{ const k=e.key.length===1?e.key.toLowerCase():e.key;
      if(k==='ArrowLeft'||k==='a'){ e.preventDefault(); keyDir=-1; }
      else if(k==='ArrowRight'||k==='d'){ e.preventDefault(); keyDir=1; }
      else if(k==='p'){ e.preventDefault(); togglePause(); }
      else if(k==='r'){ e.preventDefault(); start(); }
      else if((k===' '||k==='Enter')&&!alive){ e.preventDefault(); start(); } });
    addEventListener('keyup',e=>{ const k=e.key.length===1?e.key.toLowerCase():e.key;
      if(((k==='ArrowLeft'||k==='a')&&keyDir<0)||((k==='ArrowRight'||k==='d')&&keyDir>0)) keyDir=0; });
    document.getElementById('again').onclick=start;

    function step(){ t++;
      if(alive&&!paused){
        if(keyDir) paddle.x=Math.max(0,Math.min(W-paddle.w, paddle.x+keyDir*8));
        ball.x+=ball.vx; ball.y+=ball.vy;
        if(ball.x<ball.r){ ball.x=ball.r; ball.vx*=-1; } if(ball.x>W-ball.r){ ball.x=W-ball.r; ball.vx*=-1; }
        if(ball.y<ball.r){ ball.y=ball.r; ball.vy*=-1; }
        if(ball.y+ball.r>=paddle.y && ball.y<paddle.y+paddle.h &&
           ball.x>paddle.x && ball.x<paddle.x+paddle.w && ball.vy>0){
          ball.vy*=-1; ball.vy-=0.15; ball.vx+=(ball.x-(paddle.x+paddle.w/2))/18;
          hits++; updateHud(); burst(ball.x,paddle.y,'#9ab4ff',10); }
        if(ball.y>H+40) loseLife();
      }
      particles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=0.08; p.life-=0.03; });
      particles=particles.filter(p=>p.life>0);

      // background gradient
      const g=ctx.createLinearGradient(0,0,0,H);
      g.addColorStop(0,'#0e0f13'); g.addColorStop(1,'#151926'); ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
      // subtle animated center line
      ctx.save(); ctx.globalAlpha=0.12+0.05*Math.sin(t/40); ctx.strokeStyle='#6c8cff';
      ctx.setLineDash([6,12]); ctx.lineWidth=2; ctx.beginPath();
      ctx.moveTo(W/2,0); ctx.lineTo(W/2,H); ctx.stroke(); ctx.restore();
      // ball with glow + trail-ish halo
      ctx.save(); ctx.shadowBlur=20; ctx.shadowColor='#ff7a6c';
      const bg=ctx.createRadialGradient(ball.x,ball.y,1,ball.x,ball.y,ball.r);
      bg.addColorStop(0,'#ffd2cb'); bg.addColorStop(1,'#ff7a6c');
      ctx.fillStyle=bg; ctx.beginPath(); ctx.arc(ball.x,ball.y,ball.r,0,7); ctx.fill(); ctx.restore();
      // paddle rounded with glow
      ctx.save(); ctx.shadowBlur=16; ctx.shadowColor='#6c8cff';
      const pg=ctx.createLinearGradient(paddle.x,0,paddle.x+paddle.w,0);
      pg.addColorStop(0,'#9ab4ff'); pg.addColorStop(1,'#6c8cff'); ctx.fillStyle=pg;
      ctx.beginPath(); ctx.roundRect(paddle.x,paddle.y,paddle.w,paddle.h,8); ctx.fill(); ctx.restore();
      // particles
      particles.forEach(p=>{ ctx.save(); ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle=p.color;
        ctx.shadowBlur=8; ctx.shadowColor=p.color; ctx.beginPath();
        ctx.arc(p.x,p.y,2.5*p.life,0,7); ctx.fill(); ctx.restore(); });
      requestAnimationFrame(step);
    }
    start(); step();
  </script>
</body>
</html>
