<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <rect width="320" height="200" fill="#efe6d2"/>
  <!-- notebook page (the play column) -->
  <rect x="96" y="14" width="128" height="172" rx="6" fill="#f3ece0"/>
  <!-- faint ruled lines -->
  <g stroke="#bcd0e0" stroke-width="2">
    <line x1="96" y1="46" x2="224" y2="46"/>
    <line x1="96" y1="78" x2="224" y2="78"/>
    <line x1="96" y1="110" x2="224" y2="110"/>
    <line x1="96" y1="142" x2="224" y2="142"/>
    <line x1="96" y1="174" x2="224" y2="174"/>
  </g>
  <!-- pink margin rule -->
  <line x1="112" y1="14" x2="112" y2="186" stroke="#d8a59a" stroke-width="2"/>
  <!-- page keyline -->
  <rect x="96" y="14" width="128" height="172" rx="6" fill="none" stroke="#cabd9f" stroke-width="2"/>

  <!-- blue moving platform (upper) -->
  <rect x="138" y="40" width="58" height="14" rx="6" fill="#4f86c6" stroke="#2f5a8f" stroke-width="2"/>
  <rect x="141" y="43" width="52" height="5" rx="2" fill="#7fa9da"/>

  <!-- brown breakable platform (middle right) -->
  <rect x="170" y="104" width="52" height="13" rx="6" fill="#9a6a3c" stroke="#6e4a26" stroke-width="2"/>
  <line x1="186" y1="105" x2="192" y2="116" stroke="#221f17" stroke-width="2" opacity="0.45"/>
  <line x1="200" y1="105" x2="196" y2="116" stroke="#221f17" stroke-width="2" opacity="0.45"/>

  <!-- green platform with spring (lower, the hero stands here) -->
  <rect x="104" y="150" width="64" height="15" rx="6" fill="#7caa3c" stroke="#4f6f25" stroke-width="2"/>
  <rect x="107" y="153" width="58" height="6" rx="3" fill="#9cc457"/>
  <!-- spring coil + plate on the breakable platform's right -->
  <g stroke="#221f17" stroke-width="2" fill="none">
    <polyline points="204,104 212,101 204,98 212,95"/>
  </g>
  <rect x="201" y="88" width="16" height="5" rx="2" fill="#c8923a" stroke="#221f17" stroke-width="2"/>

  <!-- the hero: green creature hopping, mid-air above the green platform -->
  <g>
    <!-- legs -->
    <rect x="120" y="138" width="7" height="12" rx="3" fill="#5d8a2c"/>
    <rect x="132" y="138" width="7" height="12" rx="3" fill="#5d8a2c"/>
    <!-- body -->
    <ellipse cx="129" cy="124" rx="18" ry="19" fill="#8fbf43" stroke="#221f17" stroke-width="2"/>
    <!-- snout -->
    <polygon points="143,116 161,122 143,130" fill="#8fbf43" stroke="#221f17" stroke-width="2"/>
    <!-- eyes -->
    <circle cx="131" cy="115" r="6" fill="#f3ece0" stroke="#221f17" stroke-width="2"/>
    <circle cx="140" cy="115" r="5" fill="#f3ece0" stroke="#221f17" stroke-width="2"/>
    <circle cx="132" cy="115" r="2.4" fill="#221f17"/>
    <circle cx="141" cy="115" r="2.2" fill="#221f17"/>
  </g>

  <!-- upward hop arrow hint -->
  <g fill="#9b3a22">
    <polygon points="70,70 84,86 76,86 76,104 64,104 64,86 56,86"/>
  </g>
</svg>
